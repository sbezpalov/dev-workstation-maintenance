# Optional AI services — set to 1 to enable during maintenance
# Keys go in config/secrets.env (copy from secrets.env.example)
#
INSTALL_OPENCLAW=0
INSTALL_OPENROUTER=0
# Run openclaw onboard after install (interactive — usually keep 0)
OPENCLAW_ONBOARD=0
# OpenClaw install: installer (official PS script) | npm (fallback, no PS)
OPENCLAW_INSTALL_METHOD=installer
OPENROUTER_CLI_PACKAGE=@openrouter/cli