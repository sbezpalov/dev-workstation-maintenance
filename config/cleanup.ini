# Disk cleanup profile
# Tier: safe | developer | aggressive (each level includes previous)
CLEANUP_TIER=developer

# UI language: auto | ru | en (see config/project.ini for project-wide setting)
LANGUAGE=auto

# Windows Disk Cleanup (cleanmgr). First time run interactively:
#   cleanmgr /sageset:65535
RUN_CLEANMGR=1
CLEANMGR_SAGESET=65535

# Empty Recycle Bin on system drive
CLEAR_RECYCLE_BIN=1

# Remove *.tmp, *.dmp, *.crash in user profile roots (safe tier)
CLEAR_LOOSE_FILES=1
